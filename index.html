<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مُحلل الأوت فيت - IK</title>
    <!-- استدعاء خط Cairo وأيقونات FontAwesome لشياكة التصميم -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة html2canvas لتحويل الكارت لصورة قابلة للشير -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-yellow: #facc15;
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --accent-color: #d946ef;
            --brand-red: #ef4444;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --border: #262626;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-yellow);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* كلمة IK باللون الأحمر يمين ويسار الخلفية */
        body::before, body::after {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 8vw;
            font-weight: 900;
            color: var(--brand-red);
            opacity: 0.85;
            letter-spacing: 2px;
            z-index: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        body::before { content: 'IK'; right: 4%; }
        body::after { content: 'IK'; left: 4%; }

        .container {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        h1 {
            font-size: 26px;
            margin: 0 0 8px 0;
            font-weight: 900;
        }

        .brand {
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(217, 70, 239, 0.3);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0 0 25px 0;
            line-height: 1.6;
        }

        .upload-area {
            border: 2px dashed #404040;
            padding: 35px 15px;
            border-radius: 16px;
            cursor: pointer;
            background: #1c1c1c;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            -webkit-tap-highlight-color: transparent;
        }

        .upload-area:hover {
            border-color: var(--accent-color);
            background: #221626;
        }

        .upload-area i {
            font-size: 36px;
            color: var(--text-muted);
        }

        .upload-area span {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 700;
        }

        #fileInput { display: none; }

        #preview {
            max-width: 100%;
            max-height: 240px;
            border-radius: 12px;
            display: none;
            object-fit: cover;
            border: 2px solid var(--border);
        }

        .btn {
            background: var(--text-main);
            color: var(--bg-dark);
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:active { transform: scale(0.98); }
        .btn:hover { background: var(--accent-color); color: white; }

        .result-card-wrapper {
            margin-top: 25px;
            display: none;
        }

        .share-card {
            background: #141414;
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
        }

        .share-card-img {
            max-width: 140px;
            max-height: 140px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px auto;
            border: 3px solid var(--accent-color);
            box-shadow: 0 0 15px rgba(217, 70, 239, 0.3);
            display: block;
        }

        /* تعديل الهيكل لمنع اللغبطة أثناء التقاط الصورة */
        .result-status {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            direction: rtl; /* إجبار الاتجاه من اليمين لليسار */
        }

        .status-emoji {
            display: inline-block;
        }

        .song-suggestion {
            background: rgba(219, 70, 239, 0.08);
            border: 1px solid rgba(219, 70, 239, 0.3);
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 14px;
            color: #f472b6;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            line-height: 1.4;
            direction: rtl;
        }

        .card-footer-brand {
            font-size: 16px;
            font-weight: 900;
            color: var(--accent-color);
            border-top: 1px solid var(--border);
            padding-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .card-insta-link {
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
            font-weight: 700;
        }

        .btn-share-post { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
            color: white; 
            margin-top: 20px; 
        }

        .toast-msg {
            font-size: 12px;
            color: #4ade80;
            margin-top: 8px;
            font-weight: bold;
            display: none;
        }

        @media (max-width: 768px) {
            body::before, body::after {
                font-size: 14vw;
                opacity: 0.7;
            }
            body::before { right: 2%; }
            body::after { left: 2%; }
            
            .container { padding: 25px 15px; border-radius: 20px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>مُحلل الأوت فيت من <span class="brand">IK</span></h1>
    <p class="subtitle">ارفع صورتك بالطقم كامل.. وشوف الأغنية التريند اللي تليق على حسابك! 👑✨</p>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <i class="fa-solid fa-cloud-arrow-up" id="uploadIcon"></i>
        <span id="uploadText">اضغط هنا لرفع صورتك بالأوت فيت كامل 📸</span>
        <img id="preview" src="#" alt="معاينة الطقم">
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)">

    <button class="btn" onclick="analyzeOutfit()">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        اكتشف أغنية الأوت فيت
    </button>

    <div class="result-card-wrapper" id="resultCardWrapper">
        <div class="share-card" id="captureCard">
            <img id="shareImg" class="share-card-img" src="#" alt="صورة العميل">
            
            <!-- تم تعديل طريقة عرض النص والإيموجي لمنع التداخل واللغبطة -->
            <div class="result-status" id="resultStatus"></div>
            
            <div class="song-suggestion" id="songSuggestion">
                <i class="fa-solid fa-music"></i> 
                <span id="songName"></span>
            </div>
            
            <div class="card-footer-brand">
                <span>IK BRAND 👑</span>
                <span class="card-insta-link"><i class="fa-brands fa-instagram"></i> @ikegypt</span>
            </div>
        </div>

        <button class="btn btn-share-post" onclick="shareAsInstagramPost()">
            <i class="fa-brands fa-instagram"></i>
            تحميل الكارت ونشر بوست إنستغرام 🚀
        </button>
        <div class="toast-msg" id="toastMsg">تم التحميل ونَسخ وصف البوست! اضغط Paste عند النشر 📋</div>

    </div>
</div>

<script>
    // فصلنا النص الصافي عن الإيموجي عشان نمررها للـ HTML بشكل سليم ومنفصل
    const outfitTracks = [
        { text: "كاريزما طاغية!", emoji: "🔥", song: "نزلها بوست حالاً على أغنية « ملوك الشياكة » واعمل منشن لـ IK", rawSong: "ملوك الشياكة" },
        { text: "شياكة متكاملة!", emoji: "👑", song: "مكانها بوست فوراً على أغنية « حتة تانية » ونوّر الأكونت", rawSong: "حتة تانية" },
        { text: "رايق ووجاهة!", emoji: "😎", song: "انشر بوست سريع على تريند « البرازيل » واقفل اللعبة", rawSong: "البرازيل" },
        { text: "فخامة وبساطة!", emoji: "✨", song: "تليق جداً بوست على أغنية « وسع وسع » وفرجهم الأناقة", rawSong: "وسع وسع" },
        { text: "حضور سينمائي!", emoji: "🎬", song: "اطلع بيها بوست على أغنية « ثابت » وخلي الأداء يتكلم", rawSong: "ثابت" },
        { text: "إطلالة عالمية!", emoji: "🌟", song: "مكانها بوست رايق على أغنية « الغزالة رايقة » وعيش المود", rawSong: "الغزالة رايقة" },
        { text: "تنسيق عبقري!", emoji: "🎯", song: "نزلها بوست حالاً على تريند « اختياراتي » واكتسح الشياكة", rawSong: "اختياراتي" }
    ];

    let currentTrack = {};

    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function(){
            const output = document.getElementById('preview');
            const shareImg = document.getElementById('shareImg');
            
            output.src = reader.result;
            shareImg.src = reader.result;
            
            output.style.display = 'block';
            document.getElementById('uploadText').style.display = 'none';
            document.getElementById('uploadIcon').style.display = 'none';
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    function analyzeOutfit() {
        const fileInput = document.getElementById('fileInput');
        if(!fileInput.files[0]) {
            alert('ارفع صورتك بالأوت فيت الأول يا فنان! 😉');
            return;
        }

        const resultCardWrapper = document.getElementById('resultCardWrapper');
        const resultStatus = document.getElementById('resultStatus');
        const songName = document.getElementById('songName');
        
        resultCardWrapper.style.display = 'block';
        resultStatus.innerHTML = '<span>چاري ضبط الإيقاع... ⏳</span>';
        document.getElementById('songSuggestion').style.display = 'none';
        document.getElementById('toastMsg').style.display = 'none';

        setTimeout(() => {
            const randomIndex = Math.floor(Math.random() * outfitTracks.length);
            currentTrack = outfitTracks[randomIndex];
            
            // حقن النص والإيموجي في عناصر منفصلة تماماً لحل مشكلة الإسكرين
            resultStatus.innerHTML = `<span>${currentTrack.text}</span> <span class="status-emoji">${currentTrack.emoji}</span>`;
            songName.innerText = currentTrack.song;
            document.getElementById('songSuggestion').style.display = 'flex';
        }, 1000);
    }

    function shareAsInstagramPost() {
        const captureArea = document.getElementById('captureCard');
        const toastMsg = document.getElementById('toastMsg');

        const textToCopy = `Outfit Check: ${currentTrack.text} ${currentTrack.emoji}\nTrack: ${currentTrack.rawSong} 🎵\n@ikegypt #IK_Brand #OutfitStyle`;
        navigator.clipboard.writeText(textToCopy).then(() => {
            toastMsg.style.display = 'block';
        }).catch(err => {
            console.log('Clipboard error', err);
        });

        html2canvas(captureArea, {
            backgroundColor: '#141414',
            scale: 2,
            useCORS: true // لضمان معالجة الصور والنصوص بأمان
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'IK-Outfit-Post.png';
            link.href = canvas.toDataURL();
            link.click();
            
            setTimeout(() => {
                window.location.href = "instagram://camera";
                setTimeout(() => {
                    if (!document.hidden) {
                        window.open("https://www.instagram.com/", "_blank");
                    }
                }, 1000);
            }, 1500);
        });
    }
</script>

</body>
</html>
